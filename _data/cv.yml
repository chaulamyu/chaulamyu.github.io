    Publications:
      - title: On the Dynamical and Thermodynamic Constraints of Axisymmetric Tropical Cyclones under Non-Symmetric-Neutrality
        authors:
          - Yu, C. L.
        publisher: JAS
        releaseDate: 2026
        summary: This research relaxed a nearly four-decade-old assumption in the theory of steady-state maximum intensity of tropical cyclones, called Symmetric Neutrality (SN).

      - title: A Novel Bias Correction Scheme for the New York State Mesonet Microwave Radiometer Temperature Retrieval
        authors:
          - Yu, C. L., B. Shrestha and Wang J. 
        publisher: Journal of Atmospheric and Oceanic Technology
        releaseDate: 2026
        summary: This research developed a novel bias correction technique for ground-based radiometer temperature retrievals.

      - title: Evaluation of the Performance of Probabilistic Precipitation Forecast of PHRaM during 2017-2023 Hurricane Seasons
        authors:
          - Yu, C. L., K. Bachmann, R. Torn., A. Brammer and F. D. Marks 
        publisher: Wea. Forecasting
        releaseDate: 2025
        summary: This research evaluates the performance of ePHRaM in Probabilistic Precipitation Forecast during 2017-2023 Hurricane Seasons

      - title: Characterizing the Impacts of 2024 Total Solar Eclipse Using New York State Mesonet Data
        authors:
          - Wang J., A. Dai, C.-L. Yu, N. Bain, D. J. McGuinnes, and B. Shrestha 
        publisher: Geophy. Res. Letters
        releaseDate: 2024
        summary: This work documented the unique NYSM observation during 2024 Total Solar Eclipse 

      - title: Tropical Cyclone Boundary Layer Asymmetries in a Tilt-Following Perspective
        authors:
          - Yu, C. L., Tang, B. H., Fovell, R. G. 
        publisher: J. Atmos. Sci.
        releaseDate: 2024
        summary: This work discovers the unique coupling relationship between TC boundary layer asymmetries and vortex tilt for TC in sheared environment.

      - title: Diverging Behaviors of Simulated Tropical Cyclones in Moderate Vertical Wind Shear
        authors:
          - Yu, C. L., Tang, B. H., Fovell, R. G. 
        publisher: J. Atmos. Sci.
        releaseDate: 2023
        summary: This work examined the cause of the divergent behaviors in structural and intensity evolution of a set of idealized experiments in the critical shear regime.

      - title: Tropical cyclone tilt and precession in moderate shear - Precession hiatus in a critical shear regime
        authors:
          - Yu, C. L., Tang, B. H., Fovell, R. G. 
        publisher: J. Atmos. Sci.
        releaseDate: 2023
        summary: This work examined the cause of the precession hiatus of a set of idealized experiments in the critical shear regime.

      - title: Updraft Maintenance and Axisymmetrization during Secondary Eyewall Formation in a Model Simulation of Hurricane Matthew (2016)
        authors:
          - Yu, C. L., Didlake, A.C., Zhang, F. 
        publisher: J. Atmos. Sci.
        releaseDate: 2022
        summary: This work examined updraft triggering and maintenance and the leading edge of cold pool, leading to the onset of SEF

