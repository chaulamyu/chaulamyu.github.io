cv:
  name: Chau-Lam Yu
  label: Research Scientist
  email: cyu7@albany.edu
  location: Department of Atmospheric and Environmental Sciences, University at Albany, SUNY
  image: ""
  summary: My research integrates geophysical fluid dynamics, high-resolution numerical modeling, and machine learning to understand the multiscale processes governing extreme weather, such as tropical cyclones, and air-sea interaction. 

  sections:
    Interests:
      - name: Dynamics and theory of Tropical Cyclones (TCs) 
        keywords: "Rapid intensification of TC, TC-shear interaction"
      - name: Atmosphere-Ocean interaction 
        keywords: "Storm-induced near-inertial wave (NIW) response, Parameterization of storm-induced NIW mixing in Ocean General Circulation Models (GOCMs), Atmosphere-ocean feedback"
      - name: Extreme weather and climate risk assessment 
        keywords: "Hurricane-induced risk of extreme wind, precipitation, and storm surge"
      - name: Machine learning and Artificial Intelligence (AI)
        keywords: "eXplainable AI (XAI) for AI-weather emulators, Physics-informed Machine Learning"

